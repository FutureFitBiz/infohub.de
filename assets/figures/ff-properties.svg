<svg xmlns="http://www.w3.org/2000/svg" width="908" height="449" overflow="hidden"><style><![CDATA[.B{fill:#fff}.C{font-family:Jaldi,Jaldi_MSFontService,sans-serif}.D{font-size:28px}.E{font-weight:700}.F{font-style:normal}.G{font-weight:400}.H{fill:#4ba3c0}.I{font-style:oblique}]]></style><defs><style>@font-face{font-family:"Jaldi";src:url(data:application/font-woff;charset=utf-8;base64,) format("woff"); font-weight:bold;font-style:oblique;} @font-face{font-family:"Jaldi";src:url(data:application/font-woff;charset=utf-8;base64,) format("woff"); font-weight:normal;font-style:normal;} @font-face{font-family:"Jaldi";src:url(data:application/font-woff;charset=utf-8;base64,) format("woff"); font-weight:bold;font-style:normal;}</style><clipPath id="A"><path d="M264 414h908v449H264z"/></clipPath></defs><g clip-path="url(#A)" transform="translate(-264 -414)"><path fill="#347c94" d="M264 771h908v82H264z"/><text transform="translate(424.174 804)" class="B C D">Social norms, global governance and economic growth<tspan x="118.167" y="31" class="E">drive</tspan><tspan x="178.167" y="31">the pursuit of future</tspan><tspan x="392.333" y="31">-</tspan><tspan x="400.167" y="31">fitness</tspan></text><path d="M695 627h469v83H695z" class="H"/><text transform="translate(743.185 661)" class="B C D">Our <tspan x="46" y="0" class="E I">physical presence </tspan><tspan x="243.667" y="0">protects the </tspan><tspan x="-21.333" y="31">health of ecosystems and communities</tspan></text><path d="M264 627h409v82H264z" class="H"/><text transform="translate(310.361 660)" class="B C D">People have the capacity and<tspan x="-20.913" y="31">opportunity to lead </tspan><tspan x="192.253" y="31" class="E I">fulfilling lives</tspan></text><path d="M264 521h598v82H264z" class="H"/><text transform="translate(323.53 554)" class="B C D E I">Natural resources <tspan x="196.833" y="0" class="F G">are managed to safeguard</tspan><tspan x="35.5" y="31" class="F G">communities, animals and ecosystems</tspan></text><path d="M264 415h295v82H264z" class="H"/><text transform="translate(303.749 448)" class="B C D E I">Energy<tspan x="79.667" y="0" class="F G">is renewable</tspan><tspan x="4.753" y="31" class="F G">and available to all</tspan></text><path d="M582 415h386v82H582z" class="H"/><text transform="translate(598.374 448)" class="B C D E I">Water<tspan x="71" y="0" class="F G">is responsibly sourced and </tspan><tspan x="96.087" y="31" class="F G">available to all</tspan></text><path d="M990 415h173v82H990z" class="H"/><text transform="translate(1015 448)" class="B C D E I">Waste<tspan x="72.167" y="0" class="F G">does </tspan><tspan x="15.753" y="31" class="F G">not exist</tspan></text><path d="M884 521h280v82H884z" class="H"/><text transform="translate(921.6 554)" class="B C D">The environment is<tspan x="0.753" y="31">free from </tspan><tspan x="106.587" y="31" class="E I">pollution</tspan></text><g fill="#347c94" fill-rule="evenodd"><path d="M323 753l31-20 31 20zm121 0l31-20 31 20zm121 0l31-20 31 20zm120 0l31.5-20 31.5 20zm121 0l31.5-20 31.5 20zm121 0l31.5-20 31.5 20zm121 0l31.5-20 31.5 20z"/></g></g></svg>