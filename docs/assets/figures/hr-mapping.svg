 G M">More people have <tspan x="-6.167" y="28">access to economic </tspan><tspan x="30.167" y="56">opportunity</tspan></text><path d="M1089.5 907.5h241v204h-241z" class="B C D E J"/><text transform="translate(1114.29 1000)" class="F G M">People’s capabilities <tspan x="16" y="28">are strengthened</tspan></text><path d="M1089.5 1111.5h241v204h-241z" class="B C D E I"/><text transform="translate(1137.74 1204)" class="F G M">Social cohesion<tspan x="0.833" y="28">is strengthened</tspan></text><path d="M1089.5 1315.5h241v204h-241z" class="B C D E J"/><text transform="translate(1144.46 1380)" class="F G M">Governance is <tspan x="3.92" y="28">strengthened</tspan><tspan x="10.253" y="56">in pursuit of</tspan><tspan x="3.92" y="84">future</tspan><tspan x="61.253" y="84">-</tspan><tspan x="68.087" y="84">fitness</tspan></text><path d="M1089.5 491.5h241v212h-241z" class="B C D E J"/><text transform="translate(1117.24 574)" class="F G M">Individual freedoms <tspan x="-0.747" y="28">are upheld for more </tspan><tspan x="60.833" y="56">people</tspan></text><g class="B C D K L N"><path d="M680.5 310.5h73.448m-73.448 82h73.448"/></g><g class="O B C D K L"><path d="M680.5 474.5h73.448m-73.448 81h73.448"/></g><g class="N B C D K L"><path d="M680.5 351.5h73.448m-73.448 82h73.448"/></g><g class="O B C D K L"><path d="M680.5 515.5h73.448m-73.448 81h73.448"/></g><g class="N B C D K L"><path d="M680.5 637.5h73.448m-73.448 82h73.448"/></g><g class="O B C D K L"><path d="M680.5 801.5h73.448m-73.448 82h73.448"/></g><g class="N B C D K L"><path d="M680.5 678.5h73.448m-73.448 82h73.448"/></g><g class="O B C D K L"><path d="M680.5 842.5h73.448m-73.448 82h73.448"/></g><path d="M680.5 965.5h73.448" class="B C D K L N"/><g class="O B C D K L"><path d="M680.5 1047.5h73.448m-73.448 81h73.448"/></g><g class="N B C D K L"><path d="M680.5 1210.5h73.448m-73.448-204h73.448"/></g><path d="M680.5 1087.5h73.448" class="B C D K L O"/><g class="N B C D K L"><path d="M680.5 1169.5h73.448m-73.448 82h73.448"/></g><g class="O B C D K L"><path d="M680.5 1292.5h73.448m-73.448 82h73.448m-73.448 82h73.448m-73.448-123h73.448m-73.448 82h73.448m-73.448 82h73.448"/></g><use xlink:href="#B" class="B C D E I"/><text transform="translate(102.728 558)" class="F G H">6. <tspan x="15.333" y="0">Right to be recognized as a person before the law</tspan></text><path d="M91.5 453.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 477)" class="F G H">1. Freedom and equality in dignity and rights</text><path d="M91.5 287.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 311)" class="F G H">3. Right to life, liberty and security of person</text><path d="M91.5 492.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 517)" class="F G H">2. Freedom from discrimination</text><path d="M91.5 369.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 393)" class="F G H">5. Freedom from torture and cruel, inhuman or degrading treatment or punishment</text><path d="M91.5 329.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 353)" class="F G H">4. Freedom from slavery</text><path d="M91.5 574.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 599)" class="F G H">7. Right of equality before the law</text><path d="M91.5 1149.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1173)" class="F G H">8. Right to remedy when rights are violated</text><path d="M91.5 411.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 436)" class="F G H">9. Freedom from unfair detainment</text><path d="M91.5 1190.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1214)" class="F G H">10. Right to a fair trial</text><path d="M91.5 1231.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1255)" class="F G H">11. Right of presumption of innocence</text><path d="M91.5 615.5h604v42h-604z" class="B C D E I"/><text transform="translate(102.728 640)" class="F G H">12. Right to privacy</text><path d="M91.5 1272.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1296)" class="F G H">13. Freedom of movement within and across borders</text><path d="M91.5 1313.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1337)" class="F G H">14. Freedom to seek asylum</text><path d="M91.5 1026.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1050)" class="F G H">15. Right to a national identity</text><path d="M91.5 1067.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1091)" class="F G H">16. Right to marriage and family</text><path d="M91.5 862.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 886)" class="F G H">17. Right to own property</text><path d="M91.5 698.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 722)" class="F G H">19. Freedom of opinion and expression</text><path d="M91.5 739.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 763)" class="F G H">20. Right to freedom of assembly and association</text><path d="M91.5 1354.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1378)" class="F G H">21. <tspan x="23.667" y="0">Right to democracy and participation in its processes</tspan></text><path d="M91.5 985.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1009)" class="F G H">22. Right to social security</text><path d="M91.5 903.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 927)" class="F G H">25. Right to meet basic needs</text><path d="M91.5 944.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 968)" class="F G H">26. Right to education</text><path d="M91.5 1108.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1132)" class="F G H">27. Right to participate in cultural life</text><path d="M91.5 780.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 804)" class="F G H">23. <tspan x="22.6" y="0">Right to economic opportunity, equal/sufficient pay and formation of trade unions</tspan></text><path d="M91.5 1395.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1419)" class="F G H">28. <tspan x="23.667" y="0">Right to an international social order which protects all rights</tspan></text><path d="M91.5 1436.5h604v41h-604z" class="B C D E I"/><text transform="translate(102.728 1460)" class="F G H">29. Responsibility to protect the rights of others</text><path d="M91.5 1477.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 1501)" class="F G H">30. Right to not have your rights removed</text><path d="M91.5 657.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 681)" class="F G H">18. Freedom of thought, conscience and religion</text><path d="M91.5 821.5h604v41h-604z" class="B C D E J"/><text transform="translate(102.728 845)" class="F G H">24. Right to rest and leisure</text><path d="M756.5 454.5h189v166h-189z" class="B C D E J"/><text transform="translate(813.385 541)" class="F G M">Equality</text><path d="M756.5 287.5h189v167h-189z" class="B C D E I"/><text transform="translate(819.635 361)" class="F G M">Health<tspan x="-17.333" y="28">and Safety</tspan></text><path d="M756.5 620.5h189v159h-189z" class="B C D E I"/><text transform="translate(793.552 704)" class="F G M">Individuality</text><path d="M756.5 779.5h189v166h-189z" class="B C D E J"/><text transform="translate(805.719 852)" class="F G M">Economic <tspan x="-11" y="28">Opportunity</tspan></text><path d="M756.5 945.5h189v83h-189z" class="B C D E I"/><text transform="translate(810.719 977)" class="F G M">Capacity<tspan x="2.333" y="28">Building</tspan></text><path d="M756.5 1028.5h189v121h-189z" class="B C D E J"/><text transform="translate(804.219 1093)" class="F G M">Belonging</text><path d="M756.5 1149.5h189v121h-189z" class="B C D E I"/><text transform="translate(794.385 1214)" class="F G M">Due process</text><path d="M756.5 1270.5h189v249h-189z" class="B C D E J"/><text transform="translate(791.135 1399)" class="F G M">Participation</text><path d="M1035.5 1089.5v120.96" class="B C D K L N"/></g></svg>